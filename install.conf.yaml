- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
    ~/.p10k.zsh:
    ~/.zshenv:
    ~/.gitconfig:
    ~/.config/bat:
      create: true
      path: config/bat
    ~/.agents/skills:
      create: true
      path: agents/skills
      force: true
    ~/.copilot/skills:
      create: true
      path: agents/skills
    ~/.claude/skills:
      create: true
      path: agents/skills

- create:
    - ~/Projects

- shell:
    - command: ./setup_homebrew.zsh
      stdout: true
      stderr: true
    - command: ./setup_zsh.zsh
      stdout: true
      stderr: true
    - command: ./setup_node.zsh
      stdout: true
      stderr: true
