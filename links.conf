# Symlink manifest for ./install
# Format: <source> <target> [force]
#   <source>  path relative to this repo
#   <target>  destination (~ is expanded)
#   force     optional; replace target even if it is a real file/dir
# Lines starting with # and blank lines are ignored.

zshrc          ~/.zshrc
zshenv         ~/.zshenv force
gitconfig      ~/.gitconfig
config/bat     ~/.config/bat force
config/btop    ~/.config/btop force
config/opencode ~/.config/opencode force
config/starship.toml ~/.config/starship.toml force
agents/skills  ~/.agents/skills   force
agents/skills  ~/.copilot/skills
agents/skills  ~/.claude/skills
